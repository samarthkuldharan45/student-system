<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" th:href="@{/css/style.css}">
<title>Insert title here</title>
</head>
<body>



	<nav class="navbar navbar-dark bg-black px-4">
		<span class="navbar-brand text-white fw-bold"> Student
			Management System </span>
	</nav>



	<div class="container mt-4">
		<h3 class="text-danger m-0 text-center">STUDENT RECORD LIST</h3>

		<div class="text-start mb-3">
			 <a href="/add" class="btn btn-success">+ Add Student</a>
		</div>

		<table class="table table-striped table-bordered">
			<thead class="table-dark text-white">
				<tr>
					<th>ID</th>
					<th>First Name</th>
					<th>last Name</th>
					<th>Email</th>
					<th>Action</th>

				</tr>
			</thead>
			<tbody>
				<tr th:each="studentvar : ${stud}">
					<td th:text="${studentvar.id}"></td>
					<td th:text="${studentvar.firstname}"></td>
					<td th:text="${studentvar.lastname}"></td>
					<td th:text="${studentvar.email}"></td>
                    <td><a th:href="@{students/edit/{id}(id=${studentvar.id})}" class="btn btn-info">Update</a>
                         <a th:href="@{stud/{id} (id=${studentvar.id})}"class="btn btn-info">Delete</a> </td>
				</tr>
			</tbody>

		</table>
		
		<div class="mb-3">
    <a href="/students/excel" class="btn btn-success">Excel</a>
    
</div>
	</div>
</body>
</html>
