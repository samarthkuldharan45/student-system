<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<title>Student Registration</title>

<style>
	body {
		background: linear-gradient(to right, #667eea, #764ba2);
		height: 100vh;
	}

	.card {
		border-radius: 15px;
		box-shadow: 0 8px 20px rgba(0,0,0,0.2);
	}

	.form-control {
		border-radius: 10px;
	}

	.btn-primary {
		border-radius: 25px;
		padding: 8px 20px;
	}

	h2 {
		font-weight: bold;
	}
</style>

</head>

<body>

   <nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">

    <!-- Brand -->
    <a th:href="@{/}" class="navbar-brand fw-bold">
        📘 Student Management
    </a>

    <!-- Toggle button (for mobile) -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menu Items -->
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">

            <li class="nav-item">
                <a class="nav-link" th:href="@{/stud}">Home</a>
            </li>

            

        </ul>
    </div>

</nav>

	<div class="container d-flex justify-content-center align-items-center vh-100">
		
		<div class="card p-4" style="width: 400px;">
			
			<h2 class="text-center text-primary mb-3">🎓 Create New Student</h2>

			<form th:action="@{/studentshtmladdstud}" th:object="${studkey}" method="post">

				<div class="mb-3">
					<label class="form-label">First Name</label>
					<input type="text" th:field="*{firstname}" class="form-control" placeholder="Enter First Name" required>
				</div>

				<div class="mb-3">
					<label class="form-label">Last Name</label>
					<input type="text" th:field="*{lastname}" class="form-control" placeholder="Enter Last Name" required>
				</div>

				<div class="mb-3">
					<label class="form-label">Email</label>
					<input type="email" th:field="*{email}" class="form-control" placeholder="Enter Email" required>
				</div>

				<div class="d-grid">
					<button type="submit" class="btn btn-primary">
						Submit
					</button>
				</div>

			</form>

		</div>

	</div>

</body>
</html>
