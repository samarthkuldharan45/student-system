<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<title>Update Student</title>

<style>
	body {
		background: linear-gradient(to right, #667eea, #764ba2);
		height: 100vh;
	}

	.card {
		border-radius: 15px;
		box-shadow: 0 8px 20px rgba(0,0,0,0.2);
	}

	.form-control {
		border-radius: 10px;
	}

	.btn-primary {
		border-radius: 25px;
		padding: 8px 20px;
	}

	h2 {
		font-weight: bold;
	}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">
    <a th:href="@{/}" class="navbar-brand fw-bold">
        📘 Student Management
    </a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/stud}">Home</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center vh-100">
		
	<div class="card p-4" style="width: 400px;">
			
		<h2 class="text-center text-warning mb-3">✏️ Update Student</h2>

		<form th:action="@{/students/{id}(id=*{id})}" 
      th:object="${stud1}" method="post">

			<!-- Hidden ID -->
			<input type="hidden" th:field="*{id}">

			<div class="mb-3">
				<label class="form-label">First Name</label>
				<input type="text" th:field="*{firstname}" 
				       class="form-control" required>
			</div>

			<div class="mb-3">
				<label class="form-label">Last Name</label>
				<input type="text" th:field="*{lastname}" 
				       class="form-control" required>
			</div>

			<div class="mb-3">
				<label class="form-label">Email</label>
				<input type="email" th:field="*{email}" 
				       class="form-control" required>
			</div>

			<div class="d-grid gap-2">
				<button type="submit" class="btn btn-primary">
					Update
				</button>
				
				<a th:href="@{/stud}" class="btn btn-secondary">
					Cancel
				</a>
			</div>

		</form>

	</div>

</div>

</body>
</html>
